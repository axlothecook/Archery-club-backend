# Build the archery BACKEND image (arm64), publish to GHCR, then deploy to the Pi.
# Mirrors the proven create-resume/game-shop pipeline. Runs on every push to main.
#   1. build-and-push — build linux/arm64, push ghcr.io/axlothecook/archery-club-backend:latest
#   2. deploy-to-pi    — join the tailnet, SSH to the Pi, pull + restart the stack.
# The Pi is reached privately over Tailscale (no public SSH).
name: Build, publish, and deploy backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Gate: typecheck + unit + integration tests must pass BEFORE we build/deploy.
  # The deploy is push-to-main → straight to the Pi with no other gate, so this is
  # the safety net that stops a broken build reaching production. Integration tests
  # need a real Postgres, so we run one as a service and point Prisma at it.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: archery_club
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Main DB (used by setup-test-db to issue CREATE DATABASE) + the test DB the
      # integration suite actually runs against (name MUST contain archery_club_test
      # — integration-setup.ts refuses anything else).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/archery_club
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/archery_club_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create + migrate the test database
        run: npm run test:db:setup

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm run test:all

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/axlothecook/archery-club-backend:latest

  deploy-to-pi:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy on the Pi
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_TAILSCALE_IP }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd ~/archery-club-deploy
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
